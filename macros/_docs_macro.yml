macros:
  - name: cents_to_dollars
    description: Converting cents to dollars with custom decimal places
    arguments:
      - name: column_name
        type: column
        description: The column of the amount in cents
      - name: decimal_places
        type: integer
        description: The custom decimal places for dollars

  - name: grant_select
    description: Grant select permission on the schema
    arguments:
      - name: catalog
        type: string
        description: The catalog name, default=target.catalog
      - name: schema
        type: string
        description: The schema name, default=target.schema
      - name: principal
        type: string
        description: The principal name