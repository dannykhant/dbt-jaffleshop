version: 2

models:
  - name: fct_orders
    description: ""
    columns:
      - name: order_id
        data_type: bigint
        description: ""
        data_tests:
          - unique
          - not_null

      - name: customer_id
        data_type: bigint
        description: ""
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id

      - name: order_date
        data_type: date
        description: ""

      - name: payment_amount
        data_type: decimal(37,4)
        description: ""
