version: 2

models:
  - name: dim_customers
    description: ""
    columns:
      - name: customer_id
        data_type: bigint
        description: ""
        data_tests:
          - unique
          - not_null
          - dbt_utils.cardinality_equality:
              arguments: 
                field: customer_id
                to: ref('stg_jaffle_shop__customers')

      - name: first_name
        data_type: string
        description: ""

      - name: last_name
        data_type: string
        description: ""

      - name: first_order_date
        data_type: date
        description: ""

      - name: last_order_date
        data_type: date
        description: ""

      - name: number_of_orders
        data_type: bigint
        description: ""

      - name: lifetime_value
        data_type: decimal(38,4)
        description: ""
