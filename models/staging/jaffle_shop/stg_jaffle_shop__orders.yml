version: 2

models:
  - name: stg_jaffle_shop__orders
    description: ""
    columns:
      - name: order_id
        data_type: bigint
        description: ""
        data_tests:
          - unique
          - not_null

      - name: customer_id
        data_type: bigint
        description: ""
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_jaffle_shop_customers')
                field: customer_id

      - name: order_date
        data_type: date
        description: ""

      - name: order_status
        data_type: string
        description: ""
        data_tests:
          - accepted_values:
              arguments:
                values: ['returned', 'completed', 'return_pending', 'shipped', 'placed']
