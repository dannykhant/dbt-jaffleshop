version: 2

sources:
  - name: stripe
    database: raw
    schema: stripe
    tables:
      - name: payments
        config: 
          loaded_at_field: _loaded_at
          freshness: 
            warn_after: 
              count: 12
              period: hour
            error_after: 
              count: 7
              period: day
        columns:
          - name: id
            data_tests:
              - unique:
                  config: 
                    warn_if: ">10"
                    error_if: ">100"
                    where: "paymentmethod = 'success'"
                    limit: 10
                    store_failures: true